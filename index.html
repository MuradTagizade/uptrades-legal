<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UpTrades</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0A84FF;
            --accent: #30D5C8;
            --dark-base: #0A0F18;
            --light-base: #F8FAFC;
            --text-color: #F8FAFC;
            --text-secondary: #9BA1A6;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--dark-base);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            background-image: radial-gradient(circle at top right, rgba(10, 132, 255, 0.15) 0%, transparent 40%),
                              radial-gradient(circle at bottom left, rgba(48, 213, 200, 0.15) 0%, transparent 40%);
        }

        .container {
            max-width: 800px;
            padding: 40px 20px;
        }

        .logo {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 20px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
        }

        .tagline {
            font-size: 1.25rem;
            color: var(--text-secondary);
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .links {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .link-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            padding: 20px 40px;
            border-radius: 16px;
            text-decoration: none;
            color: var(--text-color);
            font-weight: 600;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .link-card:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .footer {
            margin-top: 60px;
            font-size: 0.875rem;
            color: var(--text-secondary);
        }
        
        .footer a {
            color: var(--accent);
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">UpTrades</div>
        <p class="tagline">Smart Portfolio Tracking & AI-Powered Market Insights.<br>Your financial journey, elevated.</p>
        
        <div class="links">
            <a href="privacy.html" class="link-card">Privacy Policy</a>
            <a href="terms.html" class="link-card">Terms & Disclaimer</a>
            <a href="account-deletion.html" class="link-card">Account Deletion</a>
        </div>

        <div class="footer">
            &copy; <script>document.write(new Date().getFullYear())</script> Murad Taghizade. All rights reserved.<br>
            Contact: <a href="mailto:Muradtagi@yandex.com">Muradtagi@yandex.com</a>
        </div>
    </div>
</body>
</html>
